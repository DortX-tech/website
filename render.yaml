services:
  - type: web
    name: dortx-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: UPLOAD_DIR
        value: uploads
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://localhost:5173,https://dortx-frontend.onrender.com,https://dortx-backend.onrender.com,https://dortxtech.com,https://www.dortxtech.com
  - type: web
    name: dortx-frontend
    runtime: static
    buildCommand: cd frontend && rm -rf node_modules build && npm ci --legacy-peer-deps && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://dortx-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
